name: C++ Build CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ make nlohmann-json3-dev

    - name: Build server
      run: |
        make server

    - name: Build client
      run: |
        make client

    - name: List artifacts
      run: ls -l